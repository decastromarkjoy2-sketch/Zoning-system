openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Zoning Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: reports
    description: Reports and exports
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard analytics
  - name: users
    description: User management
  - name: zoning
    description: Zoning records
  - name: boundaries
    description: GIS zoning boundaries
  - name: kobo
    description: KoboToolbox integration
  - name: approvals
    description: Validation workflow
  - name: audit
    description: Audit trail
  - name: notifications
    description: Notifications
paths:
  /reports/barangay-summary:
    get:
      operationId: getBarangaySummaryReport
      tags: [reports]
      summary: Barangay zoning summary report
      parameters:
        - name: zone_type
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Barangay summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BarangaySummaryRow"

  /reports/land-use-summary:
    get:
      operationId: getLandUseSummaryReport
      tags: [reports]
      summary: Land use summary report by zone type
      responses:
        "200":
          description: Land use summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LandUseSummaryRow"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/zone-distribution:
    get:
      operationId: getZoneDistribution
      tags: [dashboard]
      summary: Zone type distribution for charts
      responses:
        "200":
          description: Zone distribution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ZoneCount"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent activity feed
      responses:
        "200":
          description: Recent activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/sync-stats:
    get:
      operationId: getSyncStats
      tags: [dashboard]
      summary: KoboToolbox sync statistics
      responses:
        "200":
          description: Sync statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStats"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      parameters:
        - name: role
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /zoning-records:
    get:
      operationId: listZoningRecords
      tags: [zoning]
      summary: List zoning records
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: zone_type
          in: query
          schema:
            type: string
        - name: barangay
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated list of zoning records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZoningRecordList"
    post:
      operationId: createZoningRecord
      tags: [zoning]
      summary: Create a zoning record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ZoningRecordInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZoningRecord"

  /zoning-records/{id}:
    get:
      operationId: getZoningRecord
      tags: [zoning]
      summary: Get zoning record by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Zoning record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZoningRecord"
        "404":
          description: Not found
    patch:
      operationId: updateZoningRecord
      tags: [zoning]
      summary: Update zoning record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ZoningRecordUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZoningRecord"
    delete:
      operationId: deleteZoningRecord
      tags: [zoning]
      summary: Delete zoning record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /zoning-records/map:
    get:
      operationId: getMapRecords
      tags: [zoning]
      summary: Get all records with GPS coordinates for the map
      parameters:
        - name: zone_type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: barangay
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Map records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MapRecord"

  /zoning-boundaries:
    get:
      operationId: listZoningBoundaries
      tags: [boundaries]
      summary: List all zoning boundaries
      responses:
        "200":
          description: List of boundaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ZoningBoundary"
    post:
      operationId: createZoningBoundary
      tags: [boundaries]
      summary: Create a zoning boundary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ZoningBoundaryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZoningBoundary"

  /zoning-boundaries/{id}:
    patch:
      operationId: updateZoningBoundary
      tags: [boundaries]
      summary: Update a zoning boundary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ZoningBoundaryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZoningBoundary"
    delete:
      operationId: deleteZoningBoundary
      tags: [boundaries]
      summary: Delete a boundary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /kobo/sync:
    post:
      operationId: triggerKoboSync
      tags: [kobo]
      summary: Manually trigger KoboToolbox sync
      responses:
        "200":
          description: Sync initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"

  /kobo/submissions:
    get:
      operationId: listKoboSubmissions
      tags: [kobo]
      summary: List KoboToolbox submissions
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KoboSubmission"

  /kobo/sync-logs:
    get:
      operationId: listSyncLogs
      tags: [kobo]
      summary: List sync logs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Sync logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SyncLog"

  /kobo/config:
    get:
      operationId: getKoboConfig
      tags: [kobo]
      summary: Get KoboToolbox configuration
      responses:
        "200":
          description: Config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KoboConfig"
    patch:
      operationId: updateKoboConfig
      tags: [kobo]
      summary: Update KoboToolbox configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KoboConfigUpdate"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KoboConfig"

  /approvals:
    get:
      operationId: listApprovals
      tags: [approvals]
      summary: List approval/validation requests
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: record_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Approvals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Approval"
    post:
      operationId: createApproval
      tags: [approvals]
      summary: Submit a record for approval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalInput"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approval"

  /approvals/{id}/review:
    post:
      operationId: reviewApproval
      tags: [approvals]
      summary: Approve or reject a record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewDecision"
      responses:
        "200":
          description: Decision recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approval"

  /audit-logs:
    get:
      operationId: listAuditLogs
      tags: [audit]
      summary: List audit logs
      parameters:
        - name: user_id
          in: query
          schema:
            type: integer
        - name: entity_type
          in: query
          schema:
            type: string
        - name: entity_id
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for current user
      parameters:
        - name: unread_only
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    DashboardSummary:
      type: object
      properties:
        total_records:
          type: integer
        approved_records:
          type: integer
        pending_validations:
          type: integer
        rejected_records:
          type: integer
        under_review:
          type: integer
        total_synced:
          type: integer
        last_sync:
          type: ["string", "null"]
        unread_notifications:
          type: integer
      required:
        - total_records
        - approved_records
        - pending_validations
        - rejected_records
        - under_review
        - total_synced
        - last_sync
        - unread_notifications

    ZoneCount:
      type: object
      properties:
        zone_type:
          type: string
        count:
          type: integer
        color:
          type: string
      required: [zone_type, count, color]

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        action:
          type: string
        entity_type:
          type: string
        entity_id:
          type: integer
        description:
          type: string
        user_name:
          type: string
        created_at:
          type: string
      required: [id, action, entity_type, entity_id, description, user_name, created_at]

    SyncStats:
      type: object
      properties:
        total_syncs:
          type: integer
        successful_syncs:
          type: integer
        failed_syncs:
          type: integer
        records_synced_today:
          type: integer
        last_sync_status:
          type: ["string", "null"]
        last_sync_at:
          type: ["string", "null"]
      required:
        - total_syncs
        - successful_syncs
        - failed_syncs
        - records_synced_today
        - last_sync_status
        - last_sync_at

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [administrator, planning_officer, validator, encoder, viewer]
        is_active:
          type: boolean
        created_at:
          type: string
        updated_at:
          type: string
      required: [id, name, email, role, is_active, created_at, updated_at]

    UserInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [administrator, planning_officer, validator, encoder, viewer]
        password:
          type: string
      required: [name, email, role, password]

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [administrator, planning_officer, validator, encoder, viewer]
        is_active:
          type: boolean
        password:
          type: ["string", "null"]

    ZoningRecord:
      type: object
      properties:
        id:
          type: integer
        reference_number:
          type: string
        owner_name:
          type: string
        owner_contact:
          type: ["string", "null"]
        barangay:
          type: string
        address:
          type: string
        zone_type:
          type: string
          enum: [residential, commercial, industrial, agricultural, institutional, protected_area, mixed_use]
        status:
          type: string
          enum: [pending, under_review, approved, rejected]
        land_area:
          type: ["number", "null"]
        gps_lat:
          type: ["number", "null"]
        gps_lng:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        kobo_submission_id:
          type: ["string", "null"]
        created_by:
          type: ["integer", "null"]
        or_no:
          type: ["string", "null"]
        date_of_payment:
          type: ["string", "null"]
        corporation_name:
          type: ["string", "null"]
        corporation_address:
          type: ["string", "null"]
        authorized_rep_name:
          type: ["string", "null"]
        authorized_rep_address:
          type: ["string", "null"]
        project_type:
          type: ["string", "null"]
        project_nature:
          type: ["string", "null"]
        floor_area:
          type: ["number", "null"]
        right_over_land:
          type: ["string", "null"]
        project_tenure:
          type: ["string", "null"]
        tct_tdn:
          type: ["string", "null"]
        project_cost:
          type: ["number", "null"]
        release_mode:
          type: ["string", "null"]
        amount_paid:
          type: ["number", "null"]
        date_issued:
          type: ["string", "null"]
        created_at:
          type: string
        updated_at:
          type: string
      required:
        - id
        - reference_number
        - owner_name
        - barangay
        - address
        - zone_type
        - status
        - created_at
        - updated_at

    ZoningRecordInput:
      type: object
      properties:
        owner_name:
          type: string
        owner_contact:
          type: string
        barangay:
          type: string
        address:
          type: string
        zone_type:
          type: string
          enum: [residential, commercial, industrial, agricultural, institutional, protected_area, mixed_use]
        land_area:
          type: number
        gps_lat:
          type: number
        gps_lng:
          type: number
        notes:
          type: string
        or_no:
          type: string
        date_of_payment:
          type: string
        corporation_name:
          type: string
        corporation_address:
          type: string
        authorized_rep_name:
          type: string
        authorized_rep_address:
          type: string
        project_type:
          type: string
        project_nature:
          type: string
        floor_area:
          type: number
        right_over_land:
          type: string
        project_tenure:
          type: string
        tct_tdn:
          type: string
        project_cost:
          type: number
        release_mode:
          type: string
        amount_paid:
          type: number
        date_issued:
          type: string
      required: [owner_name, barangay, address, zone_type]

    ZoningRecordUpdate:
      type: object
      properties:
        owner_name:
          type: string
        owner_contact:
          type: string
        barangay:
          type: string
        address:
          type: string
        zone_type:
          type: string
          enum: [residential, commercial, industrial, agricultural, institutional, protected_area, mixed_use]
        status:
          type: string
          enum: [pending, under_review, approved, rejected]
        land_area:
          type: number
        gps_lat:
          type: number
        gps_lng:
          type: number
        notes:
          type: string
        or_no:
          type: string
        date_of_payment:
          type: string
        corporation_name:
          type: string
        corporation_address:
          type: string
        authorized_rep_name:
          type: string
        authorized_rep_address:
          type: string
        project_type:
          type: string
        project_nature:
          type: string
        floor_area:
          type: number
        right_over_land:
          type: string
        project_tenure:
          type: string
        tct_tdn:
          type: string
        project_cost:
          type: number
        release_mode:
          type: string
        amount_paid:
          type: number
        date_issued:
          type: string

    ZoningRecordList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ZoningRecord"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total, page, limit]

    MapRecord:
      type: object
      properties:
        id:
          type: integer
        reference_number:
          type: string
        owner_name:
          type: string
        barangay:
          type: string
        zone_type:
          type: string
        status:
          type: string
        gps_lat:
          type: number
        gps_lng:
          type: number
      required: [id, reference_number, owner_name, barangay, zone_type, status, gps_lat, gps_lng]

    ZoningBoundary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        zone_type:
          type: string
        geojson:
          type: object
        color:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        created_at:
          type: string
      required: [id, name, zone_type, geojson, created_at]

    ZoningBoundaryInput:
      type: object
      properties:
        name:
          type: string
        zone_type:
          type: string
          enum: [residential, commercial, industrial, agricultural, institutional, protected_area, mixed_use]
        geojson:
          type: object
        color:
          type: string
        description:
          type: string
      required: [name, zone_type, geojson]

    ZoningBoundaryUpdate:
      type: object
      properties:
        name:
          type: string
        zone_type:
          type: string
        geojson:
          type: object
        color:
          type: string
        description:
          type: string

    SyncResult:
      type: object
      properties:
        success:
          type: boolean
        records_synced:
          type: integer
        duplicates_skipped:
          type: integer
        errors:
          type: integer
        message:
          type: string
      required: [success, records_synced, duplicates_skipped, errors, message]

    KoboSubmission:
      type: object
      properties:
        id:
          type: integer
        submission_id:
          type: string
        form_id:
          type: string
        data:
          type: object
        synced_at:
          type: string
        processed:
          type: boolean
      required: [id, submission_id, form_id, data, synced_at, processed]

    SyncLog:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
          enum: [success, failed, in_progress]
        records_synced:
          type: integer
        duplicates_skipped:
          type: integer
        error_message:
          type: ["string", "null"]
        started_at:
          type: string
        completed_at:
          type: ["string", "null"]
      required: [id, status, records_synced, duplicates_skipped, started_at]

    KoboConfig:
      type: object
      properties:
        api_url:
          type: string
        form_id:
          type: string
        is_configured:
          type: boolean
        sync_interval_minutes:
          type: integer
        last_sync:
          type: ["string", "null"]
